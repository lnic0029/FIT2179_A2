<!DOCTYPE html>
<html>
<head>
    <script src="https://cdn.jsdelivr.net/npm/vega@5.22.1"></script>
    <script src="https://cdn.jsdelivr.net/npm/vega-lite@5.2.0"></script>
    <script src="https://cdn.jsdelivr.net/npm/vega-embed@6.20.8"></script>
    <link rel="stylesheet" type="text/css" href="css/stylesheet.css" media="all">
</head>
<body>
    <h1>Causes of Death</h1>

    <div id="choropleth_map"></div> 
    <script type="text/javascript">

        var map = "js/choropleth.vg.json";
        vegaEmbed('#choropleth_map', map).then(function(result) {}).catch(console.error);
    </script>  



    <div class="chart-text-container">
    <div id="area_graph"></div>
        <div class="chart-description">
            <p>
                This chart shows the trend of deaths over time in Australia by gender.
                It highlights a steady increase in total deaths.
            </p>
        </div>
        <script type="text/javascript">
        var total_deaths = "js/total_deaths_australia_area.vg.json";
        vegaEmbed('#area_graph', total_deaths).then(function() {}).catch(console.error);
    </script>
    </div>
    
</body>
</html>
